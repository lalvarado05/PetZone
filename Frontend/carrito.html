<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PetZone - Mi Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="dist/css/main.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
        <div class="container-fluid px-5">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <img src="img/petZone-logo.png" alt="PetZone Logo" class="logo-image" style="height: 40px;">
                <span class="logo-text">PetZone</span>
            </a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav gap-3 align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
                    <li class="nav-item">
                        <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                            <i class="fa-solid fa-right-from-bracket me-1"></i> Cerrar Sesión
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px; max-width: 600px;">
        <div class="card shadow-sm p-4">
            <h5 class="mb-4 text-center">Resumen de Compra</h5>
            
            <div id="carritoProductos"></div>

            <hr>

            <div class="d-flex justify-content-between fw-bold fs-5">
                <span>Total</span>
                <span id="totalCarrito">₡0</span>
            </div>

            <div class="text-center mt-4 d-grid gap-2">
            <button class="btn btn-dark btn-lg" onclick="procederAlPago()">
                Proceder al pago
            </button>                
            <a href="productos.html" class="btn btn-outline-secondary">Seguir comprando</a>
                <button class="btn btn-link text-danger btn-sm" onclick="vaciarCarrito()">Vaciar carrito</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/main.js"></script>
    <script src="js/carrito.js"></script>
</body>
</html>
